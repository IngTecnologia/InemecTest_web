
version: '3.8'

services:
  # Frontend con Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    container_name: inemectest-frontend
    restart: unless-stopped
    networks:
      - inemectest-network

  # Backend FastAPI (para después)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    container_name: inemectest-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/inemectest
    depends_on:
      - postgres
    networks:
      - inemectest-network
    # Comentado hasta que tengamos el backend listo
    # profiles:
    #   - backend

  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: inemectest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: inemectest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - inemectest-network

volumes:
  postgres_data:

networks:
  inemectest-network:
    driver: bridge